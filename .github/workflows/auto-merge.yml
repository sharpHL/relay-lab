name: Auto Merge

# Enable auto-merge on PRs created by the agent
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    # Only auto-merge PRs that close an issue with "agent:ready" label
    if: contains(github.event.pull_request.body, 'Closes #')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge $PR_NUMBER --auto --merge --repo ${{ github.repository }} || echo "Auto-merge already enabled or not eligible"

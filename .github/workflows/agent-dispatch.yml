name: Agent Dispatch

on:
  issues:
    types: [labeled]

jobs:
  dispatch:
    if: github.event.label.name == 'agent:ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Claude Code Agent
        uses: anthropics/claude-code-action@v1.0.66
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: "agent:ready"
          prompt: |
            You are an autonomous coding agent. Your task is to implement Issue #${{ github.event.issue.number }}.

            ## Workflow
            1. Read the Issue body for full context and acceptance criteria
            2. Create a feature branch: feat/${{ github.event.issue.number }}-<short-name>
            3. Update the Issue body status to 🟡 In Progress using gh issue edit
            4. Implement the changes described in the Issue
            5. Write unit tests for all new functionality
            6. Run npm test and ensure ALL tests pass
            7. Commit with conventional commit messages
            8. Update the Issue body with HANDOFF:
               - Status → 🟢 Complete
               - Check all Acceptance Criteria boxes
               - Fill in: Completed, Decisions Made, Gotchas, Next Session Start Here
            9. Create a PR with "Closes #${{ github.event.issue.number }}" in the body

            ## Rules
            - Zero external dependencies — use only Node.js built-ins
            - Every change must have tests
            - All existing tests must continue to pass
